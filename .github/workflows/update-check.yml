name: Check for updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for newer versions
        id: check
        run: |
          source versions.env
          UPDATES=""

          latest() {
            local repo=$1
            gh api "repos/${repo}/releases/latest" --jq '.tag_name' 2>/dev/null | sed 's/^v//'
          }

          latest_jq() {
            gh api "repos/jqlang/jq/releases/latest" --jq '.tag_name' 2>/dev/null | sed 's/^jq-//'
          }

          check_update() {
            local name=$1 current=$2 latest=$3
            if [ -n "$latest" ] && [ "$current" != "$latest" ]; then
              UPDATES="${UPDATES}${name}: ${current} → ${latest}\n"
              sed -i "s/^${name}_VERSION=.*/${name}_VERSION=${latest}/" versions.env
            fi
          }

          check_update FZF "$FZF_VERSION" "$(latest junegunn/fzf)"
          check_update FD "$FD_VERSION" "$(latest sharkdp/fd)"
          check_update BAT "$BAT_VERSION" "$(latest sharkdp/bat)"
          check_update LSD "$LSD_VERSION" "$(latest lsd-rs/lsd)"
          check_update RG "$RG_VERSION" "$(latest BurntSushi/ripgrep)"
          check_update DELTA "$DELTA_VERSION" "$(latest dandavison/delta)"
          check_update LAZYGIT "$LAZYGIT_VERSION" "$(latest jesseduffield/lazygit)"
          check_update JQ "$JQ_VERSION" "$(latest_jq)"
          check_update DIRENV "$DIRENV_VERSION" "$(latest direnv/direnv)"
          check_update NVIM "$NVIM_VERSION" "$(latest neovim/neovim)"
          check_update GIT "$GIT_VERSION" "$(latest git/git)"
          check_update HTOP "$HTOP_VERSION" "$(latest htop-dev/htop)"

          if [ -n "$UPDATES" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            printf '%b' "$UPDATES" > /tmp/updates.txt
            echo "==> Updates found:"
            cat /tmp/updates.txt
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "==> All tools are up to date"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create PR
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BRANCH="auto/update-versions-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add versions.env
          git commit -m "$(cat <<EOF
          chore: update tool versions

          $(cat /tmp/updates.txt)
          EOF
          )"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update tool versions" \
            --body "$(cat <<EOF
          ## Updated versions

          $(cat /tmp/updates.txt)

          ---
          Auto-generated by [update-check](.github/workflows/update-check.yml)
          EOF
          )"
        env:
          GH_TOKEN: ${{ github.token }}
