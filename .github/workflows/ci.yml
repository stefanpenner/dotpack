name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Unit tests on all platforms
  test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
          - runner: macos-15
            goos: darwin
          - runner: windows-latest
            goos: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: go build -ldflags "-s -w -X main.Version=test" -o dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} .

      - name: Smoke test
        shell: bash
        run: |
          ./dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} version
          ./dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} versions

      - name: Go tests
        run: go test ./...

  # Build dotpack CLI binaries for all platforms
  cli:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: linux-x86_64
          - goos: linux
            goarch: arm64
            name: linux-aarch64
          - goos: darwin
            goarch: arm64
            name: darwin-arm64
          - goos: windows
            goarch: amd64
            name: windows-x86_64
            ext: .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build dotpack CLI
        run: |
          version="${{ github.event.release.tag_name || 'ci' }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.Version=$version" \
            -o dotpack-${{ matrix.name }}${{ matrix.ext }} .

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-${{ matrix.name }}
          path: dotpack-${{ matrix.name }}${{ matrix.ext }}

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-${{ matrix.name }}${{ matrix.ext }}

  # Build Linux tool bundles (Docker)
  linux:
    needs: cli
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            goarch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cli-linux-${{ matrix.arch }}

      - name: Build Linux bundle
        run: |
          chmod +x dotpack-linux-${{ matrix.arch }}
          docker build -t dotpack .
          docker run --rm dotpack > dotpack-linux-${{ matrix.arch }}.tar.gz
          # Inject dotpack CLI into the bundle
          tmpdir=$(mktemp -d)
          tar xzf dotpack-linux-${{ matrix.arch }}.tar.gz -C "$tmpdir"
          cp dotpack-linux-${{ matrix.arch }} "$tmpdir/bin/dotpack"
          tar czf dotpack-linux-${{ matrix.arch }}.tar.gz -C "$tmpdir" .
          rm -rf "$tmpdir"
          ls -lh dotpack-linux-${{ matrix.arch }}.tar.gz

      - name: Verify bundle
        run: |
          mkdir -p /tmp/dotpack-verify
          tar xzf dotpack-linux-${{ matrix.arch }}.tar.gz -C /tmp/dotpack-verify

          echo "==> Verifying wrappers..."
          for f in git zsh nvim go gofmt; do
            head -1 "/tmp/dotpack-verify/bin/$f" | grep -q '#!/bin/sh' || { echo "FAIL: bin/$f not a wrapper"; exit 1; }
            echo "  bin/$f: wrapper ok"
          done

          echo "==> Verifying static linkage..."
          for f in git/bin/git zsh/bin/zsh bin/htop bin/btop nvim/bin/nvim; do
            file "/tmp/dotpack-verify/$f" | grep -q 'statically linked' || { echo "WARN: $f not static"; }
            echo "  $f: $(file "/tmp/dotpack-verify/$f" | grep -o 'statically linked' || echo 'dynamically linked')"
          done

          echo "==> Verifying tools execute..."
          /tmp/dotpack-verify/bin/go version
          /tmp/dotpack-verify/bin/nvim --version | head -1
          /tmp/dotpack-verify/bin/htop --version | head -1
          /tmp/dotpack-verify/bin/btop --version | head -1

          echo "==> All checks passed."

      - name: Generate checksum
        run: sha256sum dotpack-linux-${{ matrix.arch }}.tar.gz > dotpack-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest build provenance
        if: github.event_name == 'release' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: dotpack-linux-${{ matrix.arch }}.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-linux-${{ matrix.arch }}.tar.gz \
            dotpack-linux-${{ matrix.arch }}.tar.gz.sha256

  # Build Darwin tool bundle
  darwin:
    needs: cli
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: brew install cmake ninja autoconf automake libtool

      - name: Build dotpack CLI
        run: |
          version="${{ github.event.release.tag_name || 'ci' }}"
          go build -ldflags "-s -w -X main.Version=$version" -o dotpack .

      - name: Build Darwin bundle
        run: |
          ./dotpack build --os darwin --arch ${{ matrix.arch }}
          ls -lh dotpack-darwin-${{ matrix.arch }}.tar.gz

      - name: Verify bundle
        run: |
          mkdir -p /tmp/dotpack-verify
          tar xzf dotpack-darwin-${{ matrix.arch }}.tar.gz -C /tmp/dotpack-verify

          echo "==> Verifying wrappers..."
          for f in nvim go gofmt; do
            test ! -L "/tmp/dotpack-verify/bin/$f" || { echo "FAIL: bin/$f is a symlink"; exit 1; }
            head -1 "/tmp/dotpack-verify/bin/$f" | grep -q '#!/bin/sh' || { echo "FAIL: bin/$f not a wrapper"; exit 1; }
            echo "  bin/$f: wrapper ok"
          done

          echo "==> Verifying env vars..."
          grep -q 'VIMRUNTIME' /tmp/dotpack-verify/bin/nvim || { echo "FAIL: nvim missing VIMRUNTIME"; exit 1; }
          grep -q 'GOROOT' /tmp/dotpack-verify/bin/go || { echo "FAIL: go missing GOROOT"; exit 1; }

          echo "==> Verifying source-built tools..."
          test -x /tmp/dotpack-verify/bin/htop || { echo "FAIL: htop not found"; exit 1; }
          test -x /tmp/dotpack-verify/bin/btop || { echo "FAIL: btop not found"; exit 1; }
          test -x /tmp/dotpack-verify/nvim/bin/nvim || { echo "FAIL: nvim not found"; exit 1; }
          test -d /tmp/dotpack-verify/nvim/share/nvim/runtime || { echo "FAIL: nvim runtime not found"; exit 1; }

          echo "==> Verifying tools execute..."
          /tmp/dotpack-verify/bin/go version
          GOROOT_OUT=$(/tmp/dotpack-verify/bin/go env GOROOT)
          echo "$GOROOT_OUT" | grep -q '/tmp/dotpack-verify/go' || { echo "FAIL: GOROOT wrong"; exit 1; }
          /tmp/dotpack-verify/bin/nvim --version | head -1
          /tmp/dotpack-verify/bin/htop --version | head -1
          /tmp/dotpack-verify/bin/btop --version | head -1

          echo "==> All checks passed."

      - name: Generate checksum
        run: shasum -a 256 dotpack-darwin-${{ matrix.arch }}.tar.gz > dotpack-darwin-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest build provenance
        if: github.event_name == 'release' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: dotpack-darwin-${{ matrix.arch }}.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-darwin-${{ matrix.arch }}.tar.gz \
            dotpack-darwin-${{ matrix.arch }}.tar.gz.sha256

  # Build Windows tool bundle
  windows:
    needs: cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build dotpack CLI
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if (-not $version) { $version = "ci" }
          go build -ldflags "-s -w -X main.Version=$version" -o dotpack.exe .

      - name: Build Windows bundle
        run: |
          .\dotpack.exe build --os windows --arch x86_64
          Get-ChildItem dotpack-windows-x86_64.zip

      - name: Verify bundle
        shell: bash
        run: |
          mkdir -p /tmp/dotpack-verify
          unzip -qo dotpack-windows-*.zip -d /tmp/dotpack-verify

          echo "==> Verifying .cmd wrappers..."
          for f in git nvim go gofmt; do
            test -f "/tmp/dotpack-verify/bin/$f.cmd" || { echo "FAIL: bin/$f.cmd not found"; exit 1; }
            grep -q '@echo off' "/tmp/dotpack-verify/bin/$f.cmd" || { echo "FAIL: bin/$f.cmd missing @echo off"; exit 1; }
            echo "  bin/$f.cmd: wrapper ok"
          done

          grep -q 'GIT_EXEC_PATH' /tmp/dotpack-verify/bin/git.cmd || { echo "FAIL: git.cmd missing GIT_EXEC_PATH"; exit 1; }
          grep -q 'GOROOT' /tmp/dotpack-verify/bin/go.cmd || { echo "FAIL: go.cmd missing GOROOT"; exit 1; }
          grep -q 'VIMRUNTIME' /tmp/dotpack-verify/bin/nvim.cmd || { echo "FAIL: nvim.cmd missing VIMRUNTIME"; exit 1; }

          echo "==> Verifying MinGit..."
          test -f "/tmp/dotpack-verify/git/cmd/git.exe" || { echo "FAIL: git/cmd/git.exe not found"; exit 1; }
          echo "  git/cmd/git.exe: ok"

          echo "==> All checks passed."

      - name: Generate checksum
        run: |
          $hash = (Get-FileHash -Path dotpack-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  dotpack-windows-x86_64.zip" | Out-File -FilePath dotpack-windows-x86_64.zip.sha256 -Encoding ascii -NoNewline

      - name: Attest build provenance
        if: github.event_name == 'release' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: dotpack-windows-x86_64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-windows-x86_64.zip \
            dotpack-windows-x86_64.zip.sha256

  # Upload install scripts (release only)
  upload-installer:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Upload install scripts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            scripts/install.sh \
            scripts/install.ps1
