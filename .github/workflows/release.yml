name: Build & Release

on:
  release:
    types: [created]

permissions:
  contents: write
  id-token: write       # cosign keyless signing
  attestations: write   # SLSA provenance

jobs:
  # Build dotpack CLI binaries for all platforms
  dotpack-cli:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: linux-x86_64
          - goos: linux
            goarch: arm64
            name: linux-aarch64
          - goos: darwin
            goarch: arm64
            name: darwin-arm64
          - goos: windows
            goarch: amd64
            name: windows-x86_64
            ext: .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build dotpack CLI
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.Version=${{ github.event.release.tag_name }}" \
            -o dotpack-${{ matrix.name }}${{ matrix.ext }} .

      - name: Upload CLI binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-${{ matrix.name }}${{ matrix.ext }}

  # Build Linux tool bundles (Docker multi-stage)
  linux:
    needs: dotpack-cli
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            goarch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dotpack CLI for this platform
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "dotpack-linux-${{ matrix.arch }}" --dir .
          chmod +x dotpack-linux-${{ matrix.arch }}

      - name: Build Linux bundle
        run: |
          docker build -t dotpack .
          docker run --rm dotpack > dotpack-linux-${{ matrix.arch }}.tar.gz
          # Inject dotpack CLI into the bundle
          tmpdir=$(mktemp -d)
          tar xzf dotpack-linux-${{ matrix.arch }}.tar.gz -C "$tmpdir"
          cp dotpack-linux-${{ matrix.arch }} "$tmpdir/bin/dotpack"
          tar czf dotpack-linux-${{ matrix.arch }}.tar.gz -C "$tmpdir" .
          rm -rf "$tmpdir"
          ls -lh dotpack-linux-${{ matrix.arch }}.tar.gz

      - name: Generate checksum
        run: |
          sha256sum dotpack-linux-${{ matrix.arch }}.tar.gz > dotpack-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest build provenance
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: dotpack-linux-${{ matrix.arch }}.tar.gz

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-linux-${{ matrix.arch }}.tar.gz \
            dotpack-linux-${{ matrix.arch }}.tar.gz.sha256

  # Build Darwin tool bundle
  darwin:
    needs: dotpack-cli
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build dotpack CLI
        run: |
          go build -ldflags "-s -w -X main.Version=${{ github.event.release.tag_name }}" -o dotpack .

      - name: Build Darwin bundle
        run: |
          ./dotpack build --os darwin --arch ${{ matrix.arch }}
          ls -lh dotpack-darwin-${{ matrix.arch }}.tar.gz

      - name: Generate checksum
        run: |
          shasum -a 256 dotpack-darwin-${{ matrix.arch }}.tar.gz > dotpack-darwin-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest build provenance
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: dotpack-darwin-${{ matrix.arch }}.tar.gz

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-darwin-${{ matrix.arch }}.tar.gz \
            dotpack-darwin-${{ matrix.arch }}.tar.gz.sha256

  # Build Windows tool bundle
  windows:
    needs: dotpack-cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build dotpack CLI
        run: |
          go build -ldflags "-s -w -X main.Version=${{ github.event.release.tag_name }}" -o dotpack.exe .

      - name: Build Windows bundle
        run: |
          .\dotpack.exe build --os windows --arch x86_64
          Get-ChildItem dotpack-windows-x86_64.zip

      - name: Generate checksum
        run: |
          $hash = (Get-FileHash -Path dotpack-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  dotpack-windows-x86_64.zip" | Out-File -FilePath dotpack-windows-x86_64.zip.sha256 -Encoding ascii -NoNewline

      - name: Attest build provenance
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: dotpack-windows-x86_64.zip

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dotpack-windows-x86_64.zip \
            dotpack-windows-x86_64.zip.sha256

  # CI tests — verify the CLI builds and runs on all platforms
  test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
          - runner: macos-14
            goos: darwin
          - runner: windows-latest
            goos: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags "-s -w -X main.Version=test" -o dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} .

      - name: Smoke test
        shell: bash
        run: |
          ./dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} version
          ./dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} versions

  upload-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Upload install scripts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            scripts/install.sh \
            scripts/install.ps1
