name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Build + test with Bazel on all platforms
  test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
          - runner: macos-15
            os: darwin
          - runner: windows-latest
            os: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Bazel
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ matrix.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ matrix.os }}-

      - name: Build CLI
        run: bazel build //:devlayer

      - name: Run tests
        run: bazel test //...

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            ./bazel-bin/devlayer_/devlayer.exe version
            ./bazel-bin/devlayer_/devlayer.exe versions
          else
            ./bazel-bin/devlayer_/devlayer version
            ./bazel-bin/devlayer_/devlayer versions
          fi


  # Build devlayer CLI binaries for all platforms (cross-compiled via Bazel)
  cli:
    strategy:
      matrix:
        include:
          - config: go-linux-amd64
            name: linux-x86_64
            binary: devlayer
          - config: go-linux-arm64
            name: linux-aarch64
            binary: devlayer
          - config: go-darwin-arm64
            name: darwin-arm64
            binary: devlayer
          - config: go-windows-amd64
            name: windows-x86_64
            binary: devlayer.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Bazel
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-cli-${{ matrix.name }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-cli-${{ matrix.name }}-

      - name: Build devlayer CLI
        run: bazel build //:devlayer --config=${{ matrix.config }}

      - name: Prepare artifact
        run: cp bazel-bin/devlayer_/${{ matrix.binary }} devlayer-${{ matrix.name }}${{ matrix.binary == 'devlayer.exe' && '.exe' || '' }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-${{ matrix.name }}
          path: devlayer-${{ matrix.name }}${{ matrix.binary == 'devlayer.exe' && '.exe' || '' }}

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            devlayer-${{ matrix.name }}${{ matrix.binary == 'devlayer.exe' && '.exe' || '' }}

  # Build Linux tool bundles (Bazel + Docker)
  linux:
    needs: cli
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            goarch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Bazel
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-linux-bundle-${{ matrix.arch }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-linux-bundle-${{ matrix.arch }}-

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cli-linux-${{ matrix.arch }}

      - name: Build Linux bundle
        run: |
          bazel build //linux:bundle_${{ matrix.arch }}
          cp bazel-bin/linux/devlayer-linux-${{ matrix.arch }}.tar.gz .
          # Inject devlayer CLI into the bundle
          tmpdir=$(mktemp -d)
          tar xzf devlayer-linux-${{ matrix.arch }}.tar.gz -C "$tmpdir"
          chmod +x devlayer-linux-${{ matrix.arch }}
          cp devlayer-linux-${{ matrix.arch }} "$tmpdir/bin/devlayer"
          tar czf devlayer-linux-${{ matrix.arch }}.tar.gz -C "$tmpdir" .
          rm -rf "$tmpdir"
          ls -lh devlayer-linux-${{ matrix.arch }}.tar.gz

      - name: Verify bundle
        run: |
          mkdir -p /tmp/devlayer-verify
          tar xzf devlayer-linux-${{ matrix.arch }}.tar.gz -C /tmp/devlayer-verify

          echo "==> Verifying wrappers..."
          for f in git zsh nvim go gofmt zig cc c++; do
            head -1 "/tmp/devlayer-verify/bin/$f" | grep -q '#!/bin/sh' || { echo "FAIL: bin/$f not a wrapper"; exit 1; }
            echo "  bin/$f: wrapper ok"
          done

          echo "==> Verifying static linkage..."
          for f in git/bin/git zsh/bin/zsh bin/htop bin/btop nvim/bin/nvim bin/make; do
            file "/tmp/devlayer-verify/$f" | grep -q 'statically linked' || { echo "WARN: $f not static"; }
            echo "  $f: $(file "/tmp/devlayer-verify/$f" | grep -o 'statically linked' || echo 'dynamically linked')"
          done

          echo "==> Verifying tools execute..."
          /tmp/devlayer-verify/bin/go version
          /tmp/devlayer-verify/bin/nvim --version | head -1
          /tmp/devlayer-verify/bin/htop --version | head -1
          /tmp/devlayer-verify/bin/btop --version | head -1
          /tmp/devlayer-verify/bin/zig version
          /tmp/devlayer-verify/bin/make --version | head -1

          echo "==> All checks passed."

      - name: Generate checksum
        run: sha256sum devlayer-linux-${{ matrix.arch }}.tar.gz > devlayer-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest build provenance
        if: github.event_name == 'release' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: devlayer-linux-${{ matrix.arch }}.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            devlayer-linux-${{ matrix.arch }}.tar.gz \
            devlayer-linux-${{ matrix.arch }}.tar.gz.sha256

  # Build Darwin tool bundle
  darwin:
    needs: cli
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Bazel
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-darwin-bundle-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-darwin-bundle-

      - name: Install build dependencies
        run: brew install cmake ninja autoconf automake libtool

      - name: Build devlayer CLI with Bazel
        run: bazel build //:devlayer

      - name: Build source tools with Bazel
        run: |
          bazel build \
            //third_party/btop \
            //third_party/make:gnumake \
            //third_party/zsh \
            --config=source-build

      - name: Build Darwin bundle
        run: |
          # Use the Bazel-built CLI to assemble the full bundle
          ./bazel-bin/devlayer_/devlayer build --os darwin --arch ${{ matrix.arch }}
          ls -lh devlayer-darwin-${{ matrix.arch }}.tar.gz

      - name: Verify bundle
        run: |
          mkdir -p /tmp/devlayer-verify
          tar xzf devlayer-darwin-${{ matrix.arch }}.tar.gz -C /tmp/devlayer-verify

          echo "==> Verifying wrappers..."
          for f in nvim go gofmt zig cc c++; do
            test ! -L "/tmp/devlayer-verify/bin/$f" || { echo "FAIL: bin/$f is a symlink"; exit 1; }
            head -1 "/tmp/devlayer-verify/bin/$f" | grep -q '#!/bin/sh' || { echo "FAIL: bin/$f not a wrapper"; exit 1; }
            echo "  bin/$f: wrapper ok"
          done

          echo "==> Verifying env vars..."
          grep -q 'VIMRUNTIME' /tmp/devlayer-verify/bin/nvim || { echo "FAIL: nvim missing VIMRUNTIME"; exit 1; }
          grep -q 'GOROOT' /tmp/devlayer-verify/bin/go || { echo "FAIL: go missing GOROOT"; exit 1; }

          echo "==> Verifying source-built tools..."
          test -x /tmp/devlayer-verify/bin/htop || { echo "FAIL: htop not found"; exit 1; }
          test -x /tmp/devlayer-verify/bin/btop || { echo "FAIL: btop not found"; exit 1; }
          test -x /tmp/devlayer-verify/bin/make || { echo "FAIL: make not found"; exit 1; }
          test -x /tmp/devlayer-verify/nvim/bin/nvim || { echo "FAIL: nvim not found"; exit 1; }
          test -d /tmp/devlayer-verify/nvim/share/nvim/runtime || { echo "FAIL: nvim runtime not found"; exit 1; }
          test -d /tmp/devlayer-verify/zig || { echo "FAIL: zig not found"; exit 1; }

          echo "==> Verifying tools execute..."
          /tmp/devlayer-verify/bin/go version
          GOROOT_OUT=$(/tmp/devlayer-verify/bin/go env GOROOT)
          echo "$GOROOT_OUT" | grep -q '/tmp/devlayer-verify/go' || { echo "FAIL: GOROOT wrong"; exit 1; }
          /tmp/devlayer-verify/bin/nvim --version | head -1
          /tmp/devlayer-verify/bin/htop --version | head -1
          /tmp/devlayer-verify/bin/btop --version | head -1
          /tmp/devlayer-verify/bin/zig version
          /tmp/devlayer-verify/bin/make --version | head -1

          echo "==> All checks passed."

      - name: Generate checksum
        run: shasum -a 256 devlayer-darwin-${{ matrix.arch }}.tar.gz > devlayer-darwin-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest build provenance
        if: github.event_name == 'release' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: devlayer-darwin-${{ matrix.arch }}.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            devlayer-darwin-${{ matrix.arch }}.tar.gz \
            devlayer-darwin-${{ matrix.arch }}.tar.gz.sha256

  # Build Windows tool bundle
  windows:
    needs: cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Bazel
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-windows-bundle-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-windows-bundle-

      - name: Build devlayer CLI with Bazel
        run: bazel build //:devlayer

      - name: Build Windows bundle
        run: |
          .\bazel-bin\devlayer_\devlayer.exe build --os windows --arch x86_64
          Get-ChildItem devlayer-windows-x86_64.zip

      - name: Verify bundle
        shell: bash
        run: |
          mkdir -p /tmp/devlayer-verify
          unzip -qo devlayer-windows-*.zip -d /tmp/devlayer-verify

          echo "==> Verifying .cmd wrappers..."
          for f in git nvim go gofmt; do
            test -f "/tmp/devlayer-verify/bin/$f.cmd" || { echo "FAIL: bin/$f.cmd not found"; exit 1; }
            grep -q '@echo off' "/tmp/devlayer-verify/bin/$f.cmd" || { echo "FAIL: bin/$f.cmd missing @echo off"; exit 1; }
            echo "  bin/$f.cmd: wrapper ok"
          done

          grep -q 'GIT_EXEC_PATH' /tmp/devlayer-verify/bin/git.cmd || { echo "FAIL: git.cmd missing GIT_EXEC_PATH"; exit 1; }
          grep -q 'GOROOT' /tmp/devlayer-verify/bin/go.cmd || { echo "FAIL: go.cmd missing GOROOT"; exit 1; }
          grep -q 'VIMRUNTIME' /tmp/devlayer-verify/bin/nvim.cmd || { echo "FAIL: nvim.cmd missing VIMRUNTIME"; exit 1; }

          echo "==> Verifying MinGit..."
          test -f "/tmp/devlayer-verify/git/cmd/git.exe" || { echo "FAIL: git/cmd/git.exe not found"; exit 1; }
          echo "  git/cmd/git.exe: ok"

          echo "==> All checks passed."

      - name: Generate checksum
        run: |
          $hash = (Get-FileHash -Path devlayer-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  devlayer-windows-x86_64.zip" | Out-File -FilePath devlayer-windows-x86_64.zip.sha256 -Encoding ascii -NoNewline

      - name: Attest build provenance
        if: github.event_name == 'release' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.1.0
        with:
          subject-path: devlayer-windows-x86_64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            devlayer-windows-x86_64.zip \
            devlayer-windows-x86_64.zip.sha256

  # Upload install scripts (release only)
  upload-installer:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Upload install scripts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            scripts/install.sh \
            scripts/install.ps1
