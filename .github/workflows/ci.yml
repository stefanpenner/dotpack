name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
          - runner: macos-14
            goos: darwin
          - runner: windows-latest
            goos: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Install build dependencies (macOS)
        if: matrix.goos == 'darwin'
        run: brew install cmake ninja autoconf automake libtool

      - name: Build
        run: go build -ldflags "-s -w -X main.Version=test" -o dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} .

      - name: Smoke test
        shell: bash
        run: |
          ./dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} version
          ./dotpack${{ matrix.goos == 'windows' && '.exe' || '' }} versions

      - name: Go tests
        run: go test ./...

      - name: Build bundle and verify (macOS)
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          ./dotpack build --os darwin
          mkdir -p /tmp/dotpack-verify
          tar xzf dotpack-darwin-*.tar.gz -C /tmp/dotpack-verify

          echo "==> Verifying wrappers are scripts, not symlinks..."
          for f in nvim go gofmt; do
            if [ -L "/tmp/dotpack-verify/bin/$f" ]; then
              echo "FAIL: bin/$f is a symlink, expected wrapper script"
              exit 1
            fi
            if ! head -1 "/tmp/dotpack-verify/bin/$f" | grep -q '#!/bin/sh'; then
              echo "FAIL: bin/$f missing shebang"
              exit 1
            fi
            echo "  bin/$f: wrapper ok"
          done

          echo "==> Verifying env vars in wrappers..."
          grep -q 'VIMRUNTIME' /tmp/dotpack-verify/bin/nvim || { echo "FAIL: nvim missing VIMRUNTIME"; exit 1; }
          grep -q 'GOROOT' /tmp/dotpack-verify/bin/go || { echo "FAIL: go missing GOROOT"; exit 1; }
          grep -q 'GOROOT' /tmp/dotpack-verify/bin/gofmt || { echo "FAIL: gofmt missing GOROOT"; exit 1; }

          echo "==> Verifying source-built tools exist..."
          test -x /tmp/dotpack-verify/bin/htop || { echo "FAIL: htop not found"; exit 1; }
          test -x /tmp/dotpack-verify/bin/btop || { echo "FAIL: btop not found"; exit 1; }
          test -x /tmp/dotpack-verify/nvim/bin/nvim || { echo "FAIL: nvim binary not found"; exit 1; }
          test -d /tmp/dotpack-verify/nvim/share/nvim/runtime || { echo "FAIL: nvim runtime not found"; exit 1; }
          echo "  htop: ok"
          echo "  btop: ok"
          echo "  nvim: ok (binary + runtime)"

          echo "==> Verifying wrappers execute correctly..."
          /tmp/dotpack-verify/bin/go version
          GOROOT_OUT=$(/tmp/dotpack-verify/bin/go env GOROOT)
          echo "  GOROOT=$GOROOT_OUT"
          echo "$GOROOT_OUT" | grep -q '/tmp/dotpack-verify/go' || { echo "FAIL: GOROOT not set correctly"; exit 1; }

          /tmp/dotpack-verify/bin/nvim --version | head -1
          /tmp/dotpack-verify/bin/htop --version | head -1
          /tmp/dotpack-verify/bin/btop --version | head -1

          echo "==> All checks passed."

      - name: Build bundle and verify wrappers (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          ./dotpack.exe build --os windows
          mkdir -p /tmp/dotpack-verify
          unzip -qo dotpack-windows-*.zip -d /tmp/dotpack-verify

          echo "==> Verifying .cmd wrappers exist..."
          for f in nvim go gofmt; do
            if [ ! -f "/tmp/dotpack-verify/bin/$f.cmd" ]; then
              echo "FAIL: bin/$f.cmd not found"
              exit 1
            fi
            if ! grep -q '@echo off' "/tmp/dotpack-verify/bin/$f.cmd"; then
              echo "FAIL: bin/$f.cmd missing @echo off"
              exit 1
            fi
            echo "  bin/$f.cmd: wrapper ok"
          done

          echo "==> Verifying env vars in wrappers..."
          grep -q 'GOROOT' /tmp/dotpack-verify/bin/go.cmd || { echo "FAIL: go.cmd missing GOROOT"; exit 1; }
          grep -q 'VIMRUNTIME' /tmp/dotpack-verify/bin/nvim.cmd || { echo "FAIL: nvim.cmd missing VIMRUNTIME"; exit 1; }

          echo "==> All wrapper checks passed."
